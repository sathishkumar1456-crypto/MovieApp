<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="javascript movie feature app">
    <title>Movie App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
</head>
<body >

   <nav class="navbar navbar-dark px-4 py-3 justify-content-top">
        <div class="logo-container" onclick="showAll()" style="cursor: pointer;">
            <img src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhM5X7iZUIiTYf8dobtgaoG1h3oIUgoJrH8w&s" height = "90px" width = "150px">
        </div>

        <div class="d-flex justify-content-center gap-2 mb-4">
            <button class="btn btn-outline-primary fw-bold" onclick="showAll()" >Show All</button>
            <button class="btn btn-outline-danger fw-bold" onclick="filterAction()">Action</button>
            <button class="btn btn-outline-secondary fw-bold" onclick="filterThriller()">Thriller</button>
            <button class="btn btn-outline-info fw-bold" onclick="filterYear()">Year</button>
            <button class="btn btn-outline-success fw-bold" onclick="filterScifi()">Sci-fi</button>
            <button class="btn btn-outline-light fw-bold" onclick="findInception()">Inception</button>
        </div>
</nav>
        
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6 d-flex gap-2">
                <input type="text" id="searchInput" class="form-control">
                <button class="btn btn-dark" onclick="searchMovie()">Search</button>
            </div>

       

        <!-- Movie List -->
         <div id="movie-container" class="row g-3"></div>

    </div>
    

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
